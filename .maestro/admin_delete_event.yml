appId: host.exp.exponent
---
- openLink: exp://10.0.0.131:8081

- assertVisible: "Admin View"
- tapOn:
    text: "Admin View"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 3000

- assertVisible: "Manage Events"

# create a temporary admin-owned event first
- tapOn:
    text: "Add"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 3000

- assertVisible: "New Event"
- waitForAnimationToEnd

- tapOn:
    id: "admin-title-input"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 3000
- setClipboard: "Delete Me Event"
- pasteText

- tapOn:
    id: "admin-description-input"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 3000
- setClipboard: "Temporary event for Maestro delete test"
- pasteText

- tapOn:
    id: "admin-date-input"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 3000
- setClipboard: "Apr 10, 2026"
- pasteText

- tapOn:
    id: "admin-location-input"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 3000
- setClipboard: "Montreal"
- pasteText

- waitForAnimationToEnd
- tapOn:
    text: "Create Event"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 3000

- extendedWaitUntil:
    visible: "Delete Me Event"
    timeout: 10000

# switch to My Events so only admin-created events are shown
- tapOn: "My Events"
- assertVisible: "Delete Me Event"

# delete the created event
- tapOn:
    text: "Delete"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 3000

- assertVisible: "Delete Event"
- assertVisible: "Are you sure?"
- tapOn:
    text: "Delete"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 3000

# verify it is gone from admin-created events
- assertVisible: "You haven't created any events yet."